name: Supabase Database Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Switch to backups branch
        run: |
          git checkout backups 2>/dev/null || git checkout --orphan backups

      - name: Set backup date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Extract Supabase project ref
        run: |
          PROJECT_REF=$(echo "${{ secrets.SUPABASE_URL }}" | sed 's|https://||' | sed 's|\.supabase\.co.*||')
          echo "PROJECT_REF=${PROJECT_REF}" >> $GITHUB_ENV

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host=db.${PROJECT_REF}.supabase.co \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --no-password \
            --format=plain \
            > "backup-${DATE}.sql"

      - name: Commit and push backup
        run: |
          git add "backup-${DATE}.sql"
          git commit -m "backup: ${DATE}" || echo "Nothing to commit"
          git push origin backups --force
